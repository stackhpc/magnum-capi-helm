---
- project-template:
    name: magnum-capi-helm-tests-cluster-v1_35
    description: |
      Runs Magnum CAPI Helm v1.35 jobs
    check:
      jobs:
        - magnum-capi-helm-tests-cluster-v1_35
        - magnum-capi-helm-tests-cluster-v1_35-2026_1
        - magnum-capi-helm-tests-cluster-v1_35-2025_2
        - magnum-capi-helm-tests-cluster-v1_35-2025_1
    gate:
      jobs:
        - magnum-capi-helm-tests-cluster-v1_35
        - magnum-capi-helm-tests-cluster-v1_35-2026_1
        - magnum-capi-helm-tests-cluster-v1_35-2025_2
        - magnum-capi-helm-tests-cluster-v1_35-2025_1

- job:
    name: magnum-capi-helm-tests-cluster-v1_35-2026_1
    parent: magnum-capi-helm-tests-cluster-v1_35
    required-projects:
      - name: openstack/magnum
        override-checkout: stable/2026.1

- job:
    name: magnum-capi-helm-tests-cluster-v1_35-2025_2
    parent: magnum-capi-helm-tests-cluster-v1_35
    required-projects:
      - name: openstack/magnum
        override-checkout: stable/2025.2

- job:
    name: magnum-capi-helm-tests-cluster-v1_35-2025_1
    parent: magnum-capi-helm-tests-cluster-v1_35
    required-projects:
      - name: openstack/magnum
        override-checkout: stable/2025.1

- job:
    name: magnum-capi-helm-tests-cluster-v1_35
    parent: magnum-capi-helm-tests-cluster
    vars:
      kube_version: "v1.35.5"
      kube_version_dir: "2026.05-5"
