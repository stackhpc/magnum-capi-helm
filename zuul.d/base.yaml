---
- job:
    name: magnum-capi-helm-tests-cluster
    parent: magnum-tempest-plugin-tests-cluster-base
    nodeset: magnum-ubuntu-noble-32GB
    pre-run: playbooks/pre.yaml
    post-run: playbooks/post.yaml
    required-projects:
      - openstack/devstack-plugin-container
      - openstack/magnum-capi-helm
      - openstack/octavia
      - openstack/ovn-octavia-provider
    roles:
      - zuul: openstack/devstack-plugin-container
    vars:
      kube_version: "v1.34.7"
      kube_version_dir: "2026.04-5"
      devstack_localrc:
        CONTAINER_ENGINE: "crio"
        CRIO_VERSION: "1.32.1"
        DISABLE_AMP_IMAGE_BUILD: true
        ETCD_VERSION: "v3.6.11"
        ETCD_SHA256: "8756f7a4eaf921668a83de0bf13c0f65cae9186a165696e3ae8396afe6f557ed"
        FIXED_RANGE: 10.1.0.0/20
        K8S_CAPI_VERSION: "v1.10.4"
        K8S_CAPO_VERSION: "v0.11.3"
        # CAPI mgmt cluster kubernetes version
        K8S_VERSION: "1.34.7"
        K8S_TOKEN: "0cvq6p.k454yiandj1tjxxv"
        K8S_COPY_KUBECONFIG_PATH: "/etc/magnum/kubeconfig"
        MAGNUM_GUEST_IMAGE_URL: "https://github.com/vexxhost/capo-image-elements/releases/download/{{ kube_version_dir }}/ubuntu-24.04-{{ kube_version }}.qcow2"
        MAGNUM_GUEST_IMAGE_EXTRA_PROPERTIES: "--property kube_version={{ kube_version }}"
        OCTAVIA_NODE: api
      devstack_local_conf:
        post-config:
          $MAGNUM_CONF:
            capi_helm:
              default_helm_chart_version: "0.23.0"
        test-config:
          $TEMPEST_CONFIG:
            magnum:
              image_id: "ubuntu-24.04-{{ kube_version }}"
              labels:
                octavia_provider: "ovn"
                master_lb_floating_ip_enabled: "true"
      devstack_plugins:
        devstack-plugin-container: https://opendev.org/openstack/devstack-plugin-container
        magnum: https://review.opendev.org/openstack/magnum
        magnum-capi-helm: https://opendev.org/openstack/magnum-capi-helm
        octavia: https://opendev.org/openstack/octavia
        ovn-octavia-provider: https://github.com/openstack/ovn-octavia-provider
      devstack_services:
        etcd3: true
        container: true
        k8s-master: true
        k8s-capi: true
        octavia: true
        o-api: true
        o-cw: true
        o-da: true
        o-hk: true
        o-hm: true

- job:
    name: magnum-capi-helm-tests-cluster-calico
    parent: magnum-capi-helm-tests-cluster
    vars:
      devstack_local_conf:
        test-config:
          $TEMPEST_CONFIG:
            magnum:
              network_driver: calico

- job:
    name: magnum-capi-helm-tests-cluster-cilium
    parent: magnum-capi-helm-tests-cluster
    vars:
      devstack_local_conf:
        post-config:
          $MAGNUM_CONF:
            cluster_template:
              kubernetes_allowed_network_drivers: flannel,calico,cilium
        test-config:
          $TEMPEST_CONFIG:
            magnum:
              network_driver: cilium
